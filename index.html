          <!-- Your page content -->
    
          <!-- Add the typing effect section where you want it in your page -->
          <div id="static-text" class="typing-effect">
            hey, i'm kaylee!<br>
            <br>
            i am currently a student at <br>the university of new south wales<br>pursuing a degree in computer science<br><br>
            i'm likely <span id="typing"></span><span class="typing-cursor"></span>.<br><br>
          </div>

          <script>
            // The sentences you want to type
            const sentences = [
              "listening to laufey",
              "playing path to nowhere",
              "re-watching arcane",
              "programming",
              "drawing my favs <3",
              "playing love and deepspace"
            ];
            
            // Delay in milliseconds
            const typingDelay = 34;
            const erasingDelay = 30;
            const newSentenceDelay = 900; // Delay between current and next sentence
            let sentenceIndex = 0;
            let characterIndex = 0;
            let typing = true;
            
            const typingElement = document.getElementById('typing');
            const cursorElement = document.querySelector('.typing-cursor');
            
            function type() {
              if (typing) {
                if (characterIndex < sentences[sentenceIndex].length) {
                  // Add next character
                  typingElement.textContent += sentences[sentenceIndex].charAt(characterIndex);
                  characterIndex++;
                  setTimeout(type, typingDelay);
                } else {
                  // End of sentence
                  typing = false;
                  cursorElement.style.opacity = '1'; // Show the cursor
                  setTimeout(type, newSentenceDelay);
                }
              } else {
                if (characterIndex > 0) {
                  // Remove last character
                  typingElement.textContent = sentences[sentenceIndex].substring(0, characterIndex - 1);
                  characterIndex--;
                  setTimeout(type, erasingDelay);
                } else {
                  // Move to the next sentence
                  typing = true;
                  sentenceIndex = (sentenceIndex + 1) % sentences.length;
                  cursorElement.style.opacity = '0'; // Hide the cursor
                  setTimeout(type, typingDelay + 1100); // Add a slight delay before typing starts to allow the cursor to blink
                }
              }
            }
            
            // Start the typing effect on load
            window.addEventListener("load", () => {
              setTimeout(type, newSentenceDelay);
            });
            </script>
